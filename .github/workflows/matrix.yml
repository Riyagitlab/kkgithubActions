name: Learning about matric
on:
  push:
  workflow_dispatch:
jobs:
    deploy:
       strategy:
         fail-fast: false
         max-parallel: 2
         matrix: 
            os: [ubuntu-latest,ubuntu-22.04,windows-latest]
            images: [hello-world,alpine]
            exclude:
              -  os: windows-latest
                 images: alpine
            include:
              - images: amd64/alpine
                os: ubuntu-22.04       
       runs-on: ${{matrix.os}}  
       steps:
        - name: Echo Docker details
          run: docker info
          
        - name: run images 0n ${{matrix.images}}
          run: docker run ${{matrix.images}}  
    